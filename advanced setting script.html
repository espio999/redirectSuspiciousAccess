<script>
  function isSuspiciousQuery(){
    const suspicious_keys = new Set([
      'ad_format_ids',
      'sua',
      'gclid',
      'fbclid',   // Facebookの追跡ID（不要な場合）
      'msclkid',  // Microsoft広告の追跡ID
    ]);

    const query_params = new URLSearchParams(window.location.search);

    let isSuspicious = false;
    for (const key of query_params.keys()) {
      if (suspicious_keys.has(key)) {
          isSuspicious = true;
          break;
      }
    }

    return isSuspicious;
  }

  function isSuspiciousTimezone(){
    const suspicious_timezone = new Set([
      'Asia/Hong_Kong',
      'Asia/Shanghai',
      'Europe/Moscow',
      'Etc/Unknown',
    ]);

    try{
      const timezone_user = Intl.DateTimeFormat().resolvedOptions().timeZone;
      return suspicious_timezone.has(timezone_user);
    }
    catch(e){
      //timezone取得不可の場合
      return true;
    }
  }
  
  function isSuspiciousResolution(){
    const suspicious_resolution = new Set([
        "0,0",
        //"360,780","780,360",
        //"375,667","667,375",
        //"375,812","812,375",
        "480,800","800,480",
        "517,826","826,517",
        "600,800","800,600",
        "600,1080","1080,600",
        "810,1080","1080,810",
        "939,587","587,939",
        "981,613","613,981",
        "1024,1280","1280,1024",
        "1200,1280","1280,1200",
        "1200,1920","1920,1200",
        "1200,3000",
        "1206,1431","1431,1206",
        "1232,1524","1524,1232",
        "1262,1440","1440,1262",
        "1366,1366",
        "1600,1000",
        "1600,1600",
        "1873,1103",
        "1895,1039",
        "1938,1068",
        //"3072,1728",
    ]);

    const is_undefined = (typeof window === 'undefined' || typeof screen === 'undefined');
    const SCREEN_WIDTH = (is_undefined) ? 0 : screen.width;
    const SCREEN_HEIGHT = (is_undefined) ? 0 : screen.height;
    const my_pair = [SCREEN_WIDTH, SCREEN_HEIGHT];
    const isSuspicious = suspicious_resolution.has(my_pair.join(','));
    return isSuspicious;
  }

  function is360browser(){
    const ua = navigator.userAgent;

    // 360 secure browser検出の正規表現
    const list_360 = [
      '360se',
      'WOW64',
      'QIHU',
    ];

    const reg_360 = new RegExp(list_360.join('|'), 'i');
    return !!(ua && reg_360.test(ua));
  }

  function isHeadless(){
    const ua = navigator.userAgent;
    const reg = /HeadlessChrome/i;

    const isSuspicious = (navigator.webdriver === true) || reg.test(ua);
    return isSuspicious;
  }

  function isServerside(){
    return (typeof window === 'undefined' || typeof screen === 'undefined')
  }

  if (isSuspiciousTimezone() || isSuspiciousResolution() || isSuspiciousQuery() || is360browser() || isHeadless() || isServerside()) {
    window.stop();
    
    const destination_url = "https://0.0.0.0";
    //window.location.replace(destination_url);

    //history.replaceState(null, '', destination_url);
    //location.reload();
    
    if (window.navigation) {
      navigation.navigate(destination_url, { history: 'replace' });
    } else {
      location.replace(destination_url);
    }
  }
</script>

<script>
  function isE2Etest_inline(){
    //E2Eテストライブラリのオブジェクトを確認
    //一つでもロードされているとtruthy→一つ目の!でfalse、二つ目の!でtrue
    //一つもロードされていないとfalse →一つ目の!でtrue、二つ目の!でfalse
    const isBot = !!(
      window.__nightmare || 
      navigator.webdriver || 
      window.Cypress || 
      window._phantom
    );

    //言語設定されていない状況を判定
    const hasNoLanguage = !!(navigator.languages && navigator.languages.length === 0);

    return (isBot || hasNoLanguage);
  }

  function isFriendlyBot_inline(){
    const bot_list = [
      'AdsBot-Google-Mobile', //Google Ads
      'Applebot',             // Apple (Siri/Spotlight)
      'bingbot',              // Bing / Microsoft Ads
      //'Baiduspider',          // Baidu (中国最大手)
      'DuckDuckBot',          // DuckDuckGo
      //'facebookexternalhit',  // Facebookのリンクプレビュー
      'Google-Read-Aloud',    //Google テキスト読み上げサービス
      'Google-Safety',    //Google テキスト読み上げサービス
      'Googlebot',            // Google
      //'PerplexityBot'         // AI検索 (Perplexity)
      'Slackbot',             // Slackのリンク展開
      'Twitterbot',           // X (Twitter) のリンク展開
      'Y!J-',                 // Yahoo! JAPAN (独自の巡回ボット)
      //'YandexBot',            // Yandex (ロシア最大手)
    ];

    const reg_bot = new RegExp(bot_list.join('|'), 'i');
    return reg_bot.test(navigator.userAgent);
  }

  function isRedirected_inline(){
    const url_param = new URLSearchParams(window.location.search);
    return !!url_param.get('expected');
  }

  window.FLAG_MAP = window.FLAG_MAP || {
    isInlineExecuted: false,
    isFriendlyBot: (isFriendlyBot_inline() && !isE2Etest_inline()),
    isNoReferrer: !document.referrer,
    isRedirected: isRedirected_inline(),
    reason: "",
    log_mode: "",
  };

  const {
    promise: gate,
    resolve: unlock,
    reject: forceOpen
  } = Promise.withResolvers();
</script>

  async function logToDiscord_inline() {
    const webhookUrl = 'https://discord.com/api/webhooks/1459720856203825315/jcn_enLc0xQKrTtKvSJev_T3m_cAnlBVlEgqZxESPBBp1V0pcPL5LGypcSJ8uZ47Q7d2';

    // user agentの取得
    const ua = navigator.userAgent;
    const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const languages = navigator.languages;
    const resolution = `${window.screen.width}x${window.screen.height}`;
    const previous_url = `${document.referrer}`;
    const current_url = `${window.location.href}`;

    // 簡単なOS・ブラウザ判別ロジック
    let os = "Unknown OS";
    if (ua.indexOf("Win") != -1) os = "Windows";
    if (ua.indexOf("Mac") != -1) os = "Mac OS";
    if (ua.indexOf("Linux") != -1) os = "Linux";
    if (ua.indexOf("Android") != -1) os = "Android";
    if (ua.indexOf("like Mac") != -1) os = "iOS";

    let browser = "Unknown Browser";
    if (ua.indexOf("Chrome") != -1) browser = "Chrome";
    else if (ua.indexOf("Firefox") != -1) browser = "Firefox";
    else if (ua.indexOf("Safari") != -1) browser = "Safari";
    else if (ua.indexOf("Edge") != -1) browser = "Edge";

    // Discordに送信するデータ構造
    let log_title = "🫥 Default";
    let log_color = 16777215; //白色

    switch (window.FLAG_MAP.log_mode) {
      case "record":
        //log_title = "👻 NoReferrer Access";
        //log_color = 10181046; // 紫色
        log_title = "🚫️ Blocking Analytics";
        log_color = 8890731; // 緑色
        break;
      case "redirect":
        log_title = "🚀 Redirect Log";
        log_color = 15158332; // 赤色
        break;
    }

    const payload = {
        embeds: [{
            title: log_title,
            color: log_color,
            fields: [
                { name: "OS", value: os, inline: true },
                { name: "Browser", value: browser, inline: true },
                { name: "Resolution", value: resolution, inline: true },
                { name: "Timezone", value: timezone, inline: true },
                { name: "Languages", value: languages.toString(), inline: true },
                { name: "Previous URL", value: previous_url, inline: false },
                { name: "Current URL", value: current_url, inline: false },
                { name: "isInlineExecuted", value: window.FLAG_MAP.isInlineExecuted, inline: true },
                { name: "isNoReferrer", value: window.FLAG_MAP.isNoReferrer, inline: true },
                { name: "isRedirected", value: window.FLAG_MAP.isRedirected, inline: true },
                { name: "Comment", value: window.FLAG_MAP.reason || "なし", inline: false },
                { name: "UserAgent", value: `\`\`\`${ua}\`\`\``, inline: false }
            ],
            timestamp: new Date().toISOString()
        }]
    };

    try {
        const response = await fetch(webhookUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
            //keepalive: true,
            //mode: 'no-cors'
        });

        if (response) console.log('Fetch completion confirmed');
        
    } catch (error) {
        console.error('Failed to post to Discord:', error);
    }
  }

  (function() {
    const isSuspiciousAccess_inline = async (source) => {

      /*
      if (window.FLAG_MAP.isInlineExecuted || window.FLAG_MAP.isRedirected) {
        unlock();
        return false;
      }
      */

      // 初回実行確認、初回実行のみ有効
      // onerrorが2回以上発生した場合、実行する必要はない
      if (window.FLAG_MAP.isInlineExecuted) {
        return false;
      }

      // 前ページでonerrorイベントがあったのだから、リダイレクトされた
      // リダイレクト先でも、同じonerrorイベントが起こる
      // リダイレクト後は、エラー処理不要
      // 検閲のみ実行する
      if (window.FLAG_MAP.isRedirected) {
        window.FLAG_MAP.isRedirected = false;
        unlock();
        return false;
      }

      window.FLAG_MAP.isInlineExecuted = true;
      window.FLAG_MAP.reason = source;
      window.FLAG_MAP.log_mode = "redirect";

      //　no referrerでなければ、検閲のみ実行する
      // 友好的なボットならば、検閲のみ実行する
      if (!window.FLAG_MAP.isNoReferrer || window.FLAG_MAP.isFriendlyBot) {
        //logToDiscord_inline("record", `onError: ${window.FLAG_MAP.reason}`);
        unlock();
        return false;
      }

      // no referrerである
      // 友好的ボットではない
      // 必要なスクリプトをブロックしている
      // アクセス集計サービスをブロックしている
      try{
        window.stop();
        //await executeLoggingAndRedirect_inline();
        await logToDiscord_inline();
        window.FLAG_MAP.isRedirected = true;
        executeRedirect_inline();
        unlock();
        return true;
      }
      catch(e){
        console.log("inline fetch error");
        forceOpen();
        return false;
      }
    };

    // 外部スクリプトから呼び出せるようにwindowに紐付ける
    window.handleScriptError = async function(source) {
      await isSuspiciousAccess_inline(source);
    };
  })();
</script>
